# =============================================================================
# Agri Compass - Spring Boot API Configuration
# =============================================================================

# Server
server.port=8080

# =============================================================================
# DATABASE (Turso / SQLite)
# To use Turso, use the libsql-jdbc driver. The JDBC URL format for Turso is:
# jdbc:sqlite:<path> for local SQLite or the Turso remote URL
# =============================================================================
spring.datasource.url=jdbc:sqlite:agricompass.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# =============================================================================
# CLERK JWT (OAuth2 Resource Server)
# =============================================================================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://delicate-moth-5.clerk.accounts.dev/.well-known/jwks.json
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://delicate-moth-5.clerk.accounts.dev

# =============================================================================
# FILE UPLOAD (Multipart)
# =============================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# =============================================================================
# AWS S3 (for file storage - optional, can use local disk for development)
# =============================================================================
aws.s3.bucket-name=your-s3-bucket-name
aws.s3.region=ap-south-1
# Set AWS credentials via environment variables: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY

# =============================================================================
# CORS (Allow your Vercel frontend)
# =============================================================================
cors.allowed-origins=http://localhost:5173,https://your-app.vercel.app

# =============================================================================
# LOGGING
# =============================================================================
logging.level.com.agricompass=DEBUG
logging.level.org.springframework.security=DEBUG

