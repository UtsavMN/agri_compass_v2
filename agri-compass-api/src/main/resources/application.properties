# =============================================================================
# Agri Compass - Spring Boot API Configuration
# =============================================================================

# Server
server.port=8080

# =============================================================================
# DATABASE (Turso / SQLite)
# =============================================================================
spring.datasource.url=jdbc:sqlite:agricompass.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# =============================================================================
# CLERK JWT (OAuth2 Resource Server)
# =============================================================================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://delicate-moth-5.clerk.accounts.dev/.well-known/jwks.json
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://delicate-moth-5.clerk.accounts.dev

# =============================================================================
# FILE UPLOAD (Multipart)
# =============================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# =============================================================================
# AWS S3 (for file storage - optional)
# =============================================================================
aws.s3.bucket-name=your-s3-bucket-name
aws.s3.region=ap-south-1

# =============================================================================
# CORS (Allow your Vercel frontend)
# =============================================================================
cors.allowed-origins=http://localhost:5173,https://your-app.vercel.app

# =============================================================================
# LOGGING
# =============================================================================
logging.level.com.agricompass=DEBUG
logging.level.org.springframework.security=DEBUG

# =============================================================================
# GEMINI AI SERVICE
# Multi-key failover: add comma-separated keys, unused keys are safe to leave blank
# =============================================================================
gemini.api.keys=YOUR_GEMINI_KEY_1,YOUR_GEMINI_KEY_2

# =============================================================================
# DATA.GOV.IN (Live Mandi/Market Prices)
# Get your key from: https://data.gov.in/
# =============================================================================
datagov.api.key=YOUR_DATAGOV_API_KEY

# =============================================================================
# OPENWEATHER (Live Weather Data)
# Get your key from: https://openweathermap.org/api
# =============================================================================
openweather.api.key=YOUR_OPENWEATHER_API_KEY
